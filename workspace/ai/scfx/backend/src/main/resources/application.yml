spring:
  application:
    name: grain-platform

  # MySQL数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/grain_platform?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Scfx@2024
    hikari:
      maximum-pool-size: 10

  # 初始化SQL
  sql:
    init:
      mode: never

  # Redis配置（可选，开发时可注释掉）
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.scfx.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
  tomcat:
    uri-encoding: UTF-8

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# 日志配置
logging:
  level:
    com.scfx: DEBUG

# 自定义配置
app:
  ai-qa-service:
    url: http://localhost:5002
  jwt:
    secret: grain-platform-secret-key-2024-hainan-reserve-group
    expiration: 86400000

  collection:
    sources:
      liangxinwang:
        name: 粮信网
        enabled: true
        username: ${LXW_USERNAME:33022}
        password: ${LXW_PASSWORD:qlp707}
        login-url: https://my.chinagrain.cn/jinnong/a/login
        report-url: https://www.chinagrain.cn/report/
    cookie-dir: data/sessions
    data-dir: data/raw

# 向量库配置
vector:
  enabled: false  # true: 使用真实向量库, false: 使用 Mock
  openai:
    api-url: https://api.openai.com/v1/embeddings
    api-key: your-api-key-here
    model: text-embedding-ada-002
    dimensions: 1536
    timeout: 30000
