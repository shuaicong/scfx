spring:
  application:
    name: grain-platform

  # 开发环境使用H2内存数据库
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/grain_platform;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false
    username: sa
    password:
    hikari:
      maximum-pool-size: 5

  # H2 Console（开发时启用）
  h2:
    console:
      enabled: true
      path: /h2-console

  # 初始化SQL
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      encoding: UTF-8

  # Redis配置（可选，开发时可注释掉）
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.scfx.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
  tomcat:
    uri-encoding: UTF-8

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# 日志配置
logging:
  level:
    com.scfx: DEBUG

# 自定义配置
app:
  ai-qa-service:
    url: http://localhost:5002
  jwt:
    secret: grain-platform-secret-key-2024-hainan-reserve-group
    expiration: 86400000

  collection:
    sources:
      liangxinwang:
        name: 粮信网
        enabled: true
        username: ${LXW_USERNAME:33022}
        password: ${LXW_PASSWORD:qlp707}
        login-url: https://my.chinagrain.cn/jinnong/a/login
        report-url: https://www.chinagrain.cn/report/
    cookie-dir: data/sessions
    data-dir: data/raw
